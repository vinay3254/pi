<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insight AI - Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0d0d0d;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle radial glow in center */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 45%, rgba(60, 55, 70, 0.45) 0%, rgba(13, 13, 13, 0) 65%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 340px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Heading */
    .heading {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
      color: #ffffff;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    .heading .gradient-line {
      background: linear-gradient(90deg, #e8622a 0%, #c94040 30%, #9b3fdb 70%, #7b5ea7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Buttons */
    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #ffffff;
      color: #111111;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      margin-bottom: 10px;
    }

    .btn-social:hover {
      background: #f0f0f0;
    }

    .btn-social:last-of-type {
      margin-bottom: 18px;
    }

    .btn-social svg,
    .btn-social img {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Email input row */
    .input-wrap {
      width: 100%;
      position: relative;
      margin-bottom: 12px;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      color: #888888;
    }

    .input-icon svg {
      width: 18px;
      height: 18px;
    }

    .email-input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 14px 16px 14px 42px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #cccccc;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .email-input::placeholder {
      color: #666666;
    }

    .email-input:focus {
      border-color: #5a5a6a;
    }

    /* Continue with email link */
    .link-email {
      font-size: 14px;
      font-weight: 500;
      color: #5b8def;
      text-decoration: none;
      margin-bottom: 16px;
      cursor: pointer;
      display: block;
      text-align: center;
      transition: color 0.15s ease;
    }

    .link-email:hover {
      color: #7aa5f5;
    }

    /* Close link */
    .link-close {
      font-size: 14px;
      font-weight: 400;
      color: #888888;
      text-decoration: none;
      cursor: pointer;
      display: block;
      text-align: center;
      transition: color 0.15s ease;
    }

    .link-close:hover {
      color: #aaaaaa;
    }

    /* Google logo SVG colors */
    .google-g { fill: #4285F4; }
    .google-r { fill: #EA4335; }
    .google-y { fill: #FBBC05; }
    .google-gr { fill: #34A853; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Heading -->
    <h1 class="heading">
      Sign up below to unlock<br />
      <span class="gradient-line">the full potential of Insight AI.</span>
    </h1>

    <!-- Continue with Apple -->
    <button class="btn-social" type="button">
      <!-- Apple logo SVG -->
      <svg viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg" fill="#111111">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105.4-57.4-155.5-127.1C46.7 790.7 0 663 0 541.8c0-207.5 135.4-317.2 269-317.2 70.1 0 128.4 46.4 172.5 46.4 42.8 0 109.6-49 191.8-49 30.8 0 108.2 2.6 168.6 75.1zm-174.4-166.3c-31.4 37.7-81.2 67.1-132.4 67.1-5.1 0-10.3-.6-15.4-1.3-1.3-5.1-1.9-10.3-1.9-16.8 0-34.5 24.9-71.5 54.3-95.7 34.5-27.6 90.2-48.3 137.2-49.9 1.3 5.8 1.9 11.5 1.9 16.8 0 32.6-13.4 64.7-43.7 79.8z"/>
      </svg>
      Continue with Apple
    </button>

    <!-- Continue with Google -->
    <button class="btn-social" type="button">
      <!-- Google logo SVG -->
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path class="google-g" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/>
        <path class="google-r" d="M6.3 14.7l7 5.1C15.1 16 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 16.3 2 9.6 7.4 6.3 14.7z"/>
        <path class="google-y" d="M24 46c5.8 0 10.7-1.9 14.6-5.1l-6.7-5.5C29.9 36.9 27.1 38 24 38c-6.1 0-10.7-4.1-11.8-9.5l-7 5.4C8.2 42.5 15.5 46 24 46z"/>
        <path class="google-gr" d="M44.5 20H24v8.5h11.8c-.9 2.5-2.5 4.6-4.6 6.1l6.7 5.5C41 36.6 44.5 30.9 44.5 24c0-1.3-.2-2.7-.5-4z"/>
      </svg>
      Continue with Google
    </button>

    <!-- Email input -->
    <div class="input-wrap">
      <span class="input-icon">
        <!-- Envelope icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
      </span>
      <input class="email-input" type="email" placeholder="enter your mail" />
    </div>

    <!-- Continue with email -->
    <a class="link-email" href="#">Continue with email</a>

    <!-- Close -->
    <a class="link-close" href="#">Close</a>

  </div>
</body>
</html>
